<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sieve of Eratosthenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #c8f135;
      --accent2:  #3dffd0;
      --text:     #f0f0f0;
      --muted:    #666;
      --error:    #ff5f5f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    /* Header */
    header {
      margin-bottom: 52px;
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
    }

    /* Input card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 180px;
    }

    label {
      display: block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"].error-input { border-color: var(--error); }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { background: #d9ff50; }
    button:active { transform: scale(0.97); }
    button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    /* Error message */
    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255, 95, 95, 0.08);
      border: 1px solid rgba(255, 95, 95, 0.3);
      border-radius: 3px;
      color: var(--error);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .error-msg.visible { display: block; }

    /* Stats bar */
    .stats {
      display: none;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stats.visible { display: flex; }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 20px;
      flex: 1;
      min-width: 140px;
    }
    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent2);
    }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 20px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .loading.visible { display: flex; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Prime grid */
    .results-section { display: none; }
    .results-section.visible { display: block; }

    .results-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .prime-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .prime-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      padding: 4px 8px;
      opacity: 0;
      animation: fadeIn 0.2s forwards;
    }

    /* Color-code by magnitude */
    .prime-tag.tier-1 { color: var(--accent); border-color: rgba(200,241,53,0.25); }
    .prime-tag.tier-2 { color: var(--accent2); border-color: rgba(61,255,208,0.2); }
    .prime-tag.tier-3 { color: #a78bfa; border-color: rgba(167,139,250,0.2); }
    .prime-tag.tier-4 { color: var(--text); }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">// Algorithm Visualizer</p>
      <h1>Sieve of<br><span>Eratosthenes</span></h1>
      <p class="subtitle">Find all prime numbers up to N &mdash; max 15,000</p>
    </header>

    <div class="card">
      <div class="input-row">
        <div class="field">
          <label for="limitInput">Find all primes up to X</label>
          <input
            type="number"
            id="limitInput"
            placeholder="e.g. 1000"
            min="2"
            max="15000"
          />
        </div>
        <button id="runBtn" onclick="runSieve()">Run Sieve</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-label">Searched up to</div>
        <div class="stat-value" id="statLimit">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Primes found</div>
        <div class="stat-value" id="statCount">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Largest prime</div>
        <div class="stat-value" id="statLargest">—</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      Running sieve…
    </div>

    <div class="results-section" id="resultsSection">
      <div class="results-header" id="resultsHeader"></div>
      <div class="prime-grid" id="primeGrid"></div>
    </div>
  </div>

  <script>
    const MAX = 15000;

    // Allow Enter key
    document.getElementById('limitInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') runSieve();
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      const input = document.getElementById('limitInput');
      el.textContent = msg;
      el.classList.add('visible');
      input.classList.add('error-input');
    }

    function clearError() {
      document.getElementById('errorMsg').classList.remove('visible');
      document.getElementById('limitInput').classList.remove('error-input');
    }

    function setLoading(on) {
      document.getElementById('loading').classList.toggle('visible', on);
      document.getElementById('runBtn').disabled = on;
    }

    function getTier(value, max) {
      const pct = value / max;
      if (pct < 0.25) return 'tier-1';
      if (pct < 0.5)  return 'tier-2';
      if (pct < 0.75) return 'tier-3';
      return 'tier-4';
    }

    async function runSieve() {
      clearError();
      document.getElementById('stats').classList.remove('visible');
      document.getElementById('resultsSection').classList.remove('visible');
      document.getElementById('primeGrid').innerHTML = '';

      const raw = document.getElementById('limitInput').value.trim();

      if (!raw) { showError('Please enter a number.'); return; }

      const limit = parseInt(raw, 10);

      if (isNaN(limit) || limit < 2) {
        showError('Please enter a whole number of at least 2.');
        return;
      }

      // Client-side enforcement of 15,000 cap
      if (limit > MAX) {
        showError('You can only request primes up to 15,000.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`/primes?limit=${limit}`);
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'An error occurred.');
          return;
        }

        renderResults(data);
      } catch (err) {
        showError('Could not reach the server. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    function renderResults(data) {
      const { limit, count, primes } = data;

      // Stats
      document.getElementById('statLimit').textContent  = limit.toLocaleString();
      document.getElementById('statCount').textContent  = count.toLocaleString();
      document.getElementById('statLargest').textContent = primes.length
        ? primes[primes.length - 1].toLocaleString() : '—';
      document.getElementById('stats').classList.add('visible');

      // Grid
      const grid   = document.getElementById('primeGrid');
      const header = document.getElementById('resultsHeader');
      header.textContent = `${count.toLocaleString()} prime${count !== 1 ? 's' : ''}`;

      // Render in chunks to keep UI responsive for large sets
      const CHUNK = 200;
      let idx = 0;

      function renderChunk() {
        const end = Math.min(idx + CHUNK, primes.length);
        for (; idx < end; idx++) {
          const tag = document.createElement('span');
          tag.className = `prime-tag ${getTier(primes[idx], limit)}`;
          tag.style.animationDelay = `${(idx % CHUNK) * 1.5}ms`;
          tag.textContent = primes[idx];
          grid.appendChild(tag);
        }
        if (idx < primes.length) requestAnimationFrame(renderChunk);
      }

      renderChunk();
      document.getElementById('resultsSection').classList.add('visible');
    }
  </script>
</body>
</html>
